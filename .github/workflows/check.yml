name: check

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      # buildRustPackage runs `cargo test` in its check phase, so this both
      # builds the nox binary and runs the unit tests.
      - name: Build and test nox
        run: nix --extra-experimental-features 'nix-command flakes' build ./host#nox --print-build-logs
