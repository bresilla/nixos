name: check

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - name: Run repository checks
        run: |
          nix --extra-experimental-features 'nix-command flakes' shell \
            nixpkgs#shellcheck \
            nixpkgs#nodejs \
            --command ./scripts/check.sh
