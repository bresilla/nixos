name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish the binary under (e.g. v0.1.0)
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31

      # Fully static x86_64 binary with YubiKey/pcsclite linked in, built through
      # nix's static toolchain. Self-contained: runs on any Linux (incl. a NixOS
      # installer) without pcsclite/glibc installed.
      - name: Build static nox
        run: |
          out="$(nix --extra-experimental-features 'nix-command flakes' build \
            .#nox-static --no-link --print-out-paths --print-build-logs)"
          install -Dm755 "$out/bin/nox" nox
          file nox

      - name: Resolve tag
        id: tag
        run: echo "tag=${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: nox
          fail_on_unmatched_files: true
